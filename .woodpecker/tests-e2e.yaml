when:
- event: push
  branch: main
- event: pull_request

steps:
- name: publish-e2e-image
  image: woodpeckerci/plugin-docker-buildx
  settings:
    platforms:
    - linux/amd64
    repo: registry.yewolf.fr/u-ctf/controller-fwk-e2e
    registry: registry.yewolf.fr
    dockerfile: Dockerfile
    context: .
    cache_from:
    - type=registry\\,ref=registry.yewolf.fr/u-ctf/controller-fwk-e2e:cache
    cache_to: type=registry,ref=registry.yewolf.fr/u-ctf/controller-fwk-e2e:cache
    auto_tag: true
    username:
      from_secret: REGISTRY_USERNAME
    password:
      from_secret: REGISTRY_PASSWORD

- name: "e2e-tests"
  image: registry.yewolf.fr/u-ctf/controller-fwk-e2e:latest
  backend_options:
    kubernetes:
      runtimeClassName: "sysbox-runc"
  commands:
  - dockerd --ip6tables=false &
  - timeout 120s bash -c 'until docker info >/dev/null 2>&1; do sleep 1; done'

  - mkdir -p coverage

  # Collect unit-test coverage in the same text profile format we will merge with operator e2e coverage.
  - go test -v ./... -coverprofile=coverage/unit_coverage.out -covermode=set -coverpkg=github.com/u-ctf/controller-fwk/...

  - cd tests/operator
  - go mod tidy
  - make test-e2e-coverage

  - cd ../..

  # Merge unit and operator e2e coverage profiles into a single profile.
  - test -s coverage/unit_coverage.out
  - test -s tests/operator/coverage.out
  - |
    awk '
      BEGIN { mode = "" }
      FNR == 1 {
        if ($1 != "mode:") {
          printf "missing coverage mode header in %s\n", FILENAME > "/dev/stderr"
          exit 1
        }
        if (mode == "") {
          mode = $2
        } else if ($2 != mode) {
          printf "coverage mode mismatch: %s vs %s in %s\n", mode, $2, FILENAME > "/dev/stderr"
          exit 1
        }
        next
      }
      {
        key = $1 " " $2
        count = $3 + 0
        if (!(key in seen)) {
          seen[key] = 1
          order[++n] = key
          counts[key] = count
        } else if (mode == "set") {
          if (count > counts[key]) {
            counts[key] = count
          }
        } else {
          counts[key] += count
        }
      }
      END {
        print "mode: " mode
        for (i = 1; i <= n; i++) {
          print order[i] " " counts[order[i]]
        }
      }
    ' coverage/unit_coverage.out tests/operator/coverage.out > coverage/merged_coverage.out

  # Filter merged coverage to contain the first line and lines with github.com/u-ctf/controller-fwk
  - |
    cat coverage/merged_coverage.out | head -n 1 > coverage/library_coverage.out
    grep "github.com/u-ctf/controller-fwk" coverage/merged_coverage.out >> coverage/library_coverage.out

    go tool cover -func=coverage/library_coverage.out -o coverage/coverage.txt
    go tool cover -html=coverage/library_coverage.out -o coverage/coverage.html

    PERCENTAGE=$(awk '/^total:/ {gsub(/%/, "", $3); printf $3}' coverage/coverage.txt)
    COLOR="red"
    if [ "$(echo "$PERCENTAGE >= 90" | bc -l)" -eq 1 ]; then
      COLOR="green"
    elif [ "$(echo "$PERCENTAGE >= 75" | bc -l)" -eq 1 ]; then
      COLOR="yellow"
    elif [ "$(echo "$PERCENTAGE >= 50" | bc -l)" -eq 1 ]; then
      COLOR="orange"
    fi
    echo "{\"schemaVersion\": 1, \"label\": \"coverage\", \"message\": \"$${PERCENTAGE}%\", \"color\": \"$COLOR\"}" > coverage/coverage_badge.json
  environment:
    CGO_ENABLED: 0
    GOOS: linux
    GOARCH: amd64

- name: upload reports
  image: woodpeckerci/plugin-s3
  settings:
    bucket:
      from_secret: S3_BUCKET
    source: coverage/**
    access_key:
      from_secret: S3_ACCESS_KEY
    secret_key:
      from_secret: S3_SECRET_KEY
    target: /public/${CI_REPO_REMOTE_ID}/${CI_COMMIT_SOURCE_BRANCH=${CI_COMMIT_BRANCH}}
    path_style: true
    overwrite: true
    endpoint:
      from_secret: S3_ENDPOINT

- name: post comment
  image: ghcr.io/yyewolf/woodpecker-plugins/github-comment
  settings:
    update_in_place: true
    message_id: 8c7653c3-9a5f-40e5-ba57-b15fbaaa13e0
    comment: |
      ## 📊 Test Coverage Report

      Coverage: [![Coverage](https://img.shields.io/endpoint?url=https://artifacts.yewolf.fr/u-ctf/public/${CI_REPO_REMOTE_ID}/${CI_COMMIT_SOURCE_BRANCH}/coverage/coverage_badge.json)](https://artifacts.yewolf.fr/u-ctf/public/${CI_REPO_REMOTE_ID}/${CI_COMMIT_SOURCE_BRANCH}/coverage/coverage.html)  
      Original Coverage: [![Target](https://img.shields.io/endpoint?url=https://artifacts.yewolf.fr/u-ctf/public/${CI_REPO_REMOTE_ID}/${CI_COMMIT_BRANCH}/coverage/coverage_badge.json)](https://artifacts.yewolf.fr/u-ctf/public/${CI_REPO_REMOTE_ID}/${CI_COMMIT_BRANCH}/coverage/coverage.html)  

      🔍 **Detailed Coverage Report**: [View HTML Report](https://artifacts.yewolf.fr/u-ctf/public/${CI_REPO_REMOTE_ID}/${CI_COMMIT_SOURCE_BRANCH}/coverage/coverage.html)
    service_url: https://github-token-svc:8443/token
    mtls_ca_cert:
      from_secret: GITHUB_MTLS_CA_CERT
    mtls_client_cert:
      from_secret: GITHUB_MTLS_CLIENT_CERT
    mtls_client_key:
      from_secret: GITHUB_MTLS_CLIENT_KEY
  when:
    event:
    - pull_request

services:
- name: github-token-svc
  image: ghcr.io/yyewolf/woodpecker-plugins/github-app-token-svc
  ports:
  - 8443
  settings:
    github_app_id:
      from_secret: GH_APP_ID
    github_installation_id:
      from_secret: GH_INSTALL_ID
    github_private_key_pem:
      from_secret: GH_APP_PEM
    mtls_ca_cert:
      from_secret: GITHUB_MTLS_CA_CERT
    mtls_server_cert:
      from_secret: GITHUB_MTLS_SERVER_CERT
    mtls_server_key:
      from_secret: GITHUB_MTLS_SERVER_KEY
